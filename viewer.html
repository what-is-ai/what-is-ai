<!DOCTYPE html>
<html>
<head>
<title>AI Viewer Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#container{
display:flex;
}

#map, #camera{
width:50%;
height:500px;
border:2px solid white;
}

select{
font-size:18px;
margin:10px;
}
</style>

</head>
<body>

<h2>AI Control Panel</h2>

<select id="deviceList"></select>

<div id="container">

<iframe id="map"></iframe>

<img id="camera"/>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
  authDomain: "yourlocation-tracker.firebaseapp.com",
  databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yourlocation-tracker",
};

firebase.initializeApp(firebaseConfig);

const deviceList = document.getElementById("deviceList");

firebase.database().ref("devices").on("value", snap=>{

deviceList.innerHTML="";

snap.forEach(child=>{

let option=document.createElement("option");

option.value=child.key;
option.text=child.key;

deviceList.appendChild(option);

});

loadDevice();

});

deviceList.onchange=loadDevice;

function loadDevice(){

let id=deviceList.value;

firebase.database().ref("devices/"+id+"/location").on("value",snap=>{

let data=snap.val();

if(data){

document.getElementById("map").src=
"https://maps.google.com/maps?q="+data.lat+","+data.lon+"&z=15&output=embed";

}

});

firebase.database().ref("devices/"+id+"/camera").on("value",snap=>{

let data=snap.val();

if(data){

document.getElementById("camera").src=data.image;

}

});

}

</script>

</body>
</html>
