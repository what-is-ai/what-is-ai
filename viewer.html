<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
background:black;
color:white;
font-family:Arial;
}

#container{
display:flex;
}

#map{
width:50%;
height:500px;
}

#cams{
width:50%;
display:flex;
flex-direction:column;
}

img{
width:100%;
height:250px;
}
</style>

</head>
<body>

<select id="devices"></select>

<div id="container">

<iframe id="map"></iframe>

<div id="cams">

<img id="front">
<img id="back">

</div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let devices=document.getElementById("devices");

firebase.database().ref("devices").on("value",snap=>{

devices.innerHTML="";

snap.forEach(child=>{

let op=document.createElement("option");

op.value=child.key;
op.text=child.key;

devices.appendChild(op);

});

load();

});

devices.onchange=load;

function load(){

let id=devices.value;

// LOCATION
firebase.database().ref("devices/"+id+"/location")
.on("value",snap=>{

let d=snap.val();

if(d){

map.src="https://maps.google.com/maps?q="+
d.lat+","+d.lon+"&output=embed";

}

});

// FRONT
firebase.database().ref("devices/"+id+"/camera/front")
.on("value",snap=>{

if(snap.val())
front.src=snap.val().img;

});

// BACK
firebase.database().ref("devices/"+id+"/camera/back")
.on("value",snap=>{

if(snap.val())
back.src=snap.val().img;

});

}

</script>

</body>
</html>
